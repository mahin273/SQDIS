global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'

receivers:
  - name: 'default-receiver'
    # By default, we set up a mock/empty webhook receiver.
    # Replace this with your actual webhook endpoint, Slack, or Email configuration.
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true


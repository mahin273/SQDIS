services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sqdis-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - sqdis-network
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: sqdis-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - sqdis-network

  grafana:
    image: grafana/grafana:10.0.3
    container_name: sqdis-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    restart: unless-stopped
    networks:
      - sqdis-network
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.8.2
    container_name: sqdis-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - sqdis-network

  promtail:
    image: grafana/promtail:2.8.2
    container_name: sqdis-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - sqdis-network
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.2.0
    container_name: sqdis-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"    # tempo http
      - "4317:4317"    # otlp grpc
      - "4318:4318"    # otlp http
    restart: unless-stopped
    networks:
      - sqdis-network

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: sqdis-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    networks:
      - sqdis-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: sqdis-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - sqdis-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local

networks:
  sqdis-network:
    driver: bridge
